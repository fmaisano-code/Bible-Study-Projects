<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Study Workbook</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
        .question { margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        textarea { width: 100%; height: 100px; padding: 8px; box-sizing: border-box; }
        .status-banner { padding: 10px; background: #f0f0f0; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 8px 16px; cursor: pointer; }
        .save-btn { background: #007bff; color: white; border: none; border-radius: 4px; padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>

    <h1>Bible Study Workbook</h1>
    
    <!-- Auth Status Banner -->
    <div class="status-banner">
        <span id="auth-status">Not signed into Google Drive</span>
        <button id="auth-btn" onclick="handleAuthClick()">Sign In</button>
    </div>

    <hr>

    <!-- Workbook Questions -->
    <div class="question">
        <label for="q1">What are your key takeaways from today's reading?</label>
        <textarea id="q1" class="workbook-input"></textarea>
    </div>

    <div class="question">
        <label for="q2">Application: How can you apply this to your life this week?</label>
        <textarea id="q2" class="workbook-input"></textarea>
    </div>

    <!-- Manual Save Button to sync to Cloud -->
    <button id="save-btn" class="save-btn" onclick="saveToDrive()" disabled>Save to Google Drive</button>

    <!-- Load Google Identity and API Client Libraries -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
        // 1. CONFIGURATION
        const CLIENT_ID = '137503511276-jook7v8dt7bbk5ud4amkppjisa9ltf2m.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        
        let tokenClient;
        let accessToken = null;
        let fileId = null; // Tracks our specific workbook file in your Drive
        const FILE_NAME = 'bible_study_workbook_data.json';

        // 2. Initialize Google API Client libraries
        gapi.load('client', async () => {
            await gapi.client.init({});
            // Load the picker/drive client discovery document
            await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            
            // Set up OAuth token client
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        throw (tokenResponse);
                    }
                    accessToken = tokenResponse.access_token;
                    document.getElementById('auth-status').innerText = "Signed Sync Enabled";
                    document.getElementById('auth-btn').innerText = "Disconnect";
                    document.getElementById('save-btn').disabled = false;
                    
                    // Automatically look for an existing file upon login
                    findOrCreateWorkbookFile();
                },
            });
        });

        // 3. Handle Login/Logout button toggling
        function handleAuthClick() {
            if (accessToken === null) {
                // Request a fresh token token (triggers Google Login popup)
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                // Wipe token to log out
                google.accounts.oauth2.revokeToken(accessToken);
                accessToken = null;
                fileId = null;
                document.getElementById('auth-status').innerText = "Not signed into Google Drive";
                document.getElementById('auth-btn').innerText = "Sign In";
                document.getElementById('save-btn').disabled = true;
            }
        }

        // 4. Look for an existing file in Drive, or establish that we need to make one
        async function findOrCreateWorkbookFile() {
            try {
                const response = await gapi.client.drive.files.list({
                    q: `name = '${FILE_NAME}' and trashed = false`,
                    fields: 'files(id, name)',
                    spaces: 'drive'
                });
                
                const files = response.result.files;
                if (files && files.length > 0) {
                    fileId = files[0].id;
                    // File found! Let's pull down the saved answers
                    loadDataFromDrive();
                } else {
                    document.getElementById('auth-status').innerText = "Ready (Will create new file on Save)";
                }
            } catch (err) {
                console.error("Error searching for file: ", err);
            }
        }

        // 5. Read file data from Drive and inject it into textareas
        async function loadDataFromDrive() {
            if (!fileId) return;
            try {
                const response = await gapi.client.drive.files.get({
                    fileId: fileId,
                    alt: 'media'
                });
                
                const data = response.result;
                // Loop over saved key/value pairs and insert them back into text fields
                Object.keys(data).forEach(id => {
                    const input = document.getElementById(id);
                    if (input) input.value = data[id];
                });
                document.getElementById('auth-status').innerText = "Data Loaded Successfully";
            } catch (err) {
                console.error("Error reading file content: ", err);
            }
        }

        // 6. Gather current inputs and overwrite/write the JSON file to Google Drive
        async function saveToDrive() {
            document.getElementById('save-btn').innerText = "Saving...";
            
            // Package up form data into a simple object
            const formData = {};
            document.querySelectorAll('.workbook-input').forEach(input => {
                formData[input.id] = input.value;
            });

            const metadata = {
                name: FILE_NAME,
                mimeType: 'application/json'
            };

            // Multiparts body format required by Google Drive API to upload text content
            const boundary = '314159265358979323846';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";

            let multipartRequestBody =
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(formData) +
                close_delim;

            let path = '/upload/drive/v3/files';
            let method = 'POST';

            // If file already exists, we use a PUT request to update it instead of creating a duplicate
            if (fileId) {
                path = `/upload/drive/v3/files/${fileId}`;
                method = 'PATCH';
            }

            try {
                const response = await gapi.client.request({
                    'path': path,
                    'method': method,
                    'params': {'uploadType': 'multipart'},
                    'headers': {
                        'Content-Type': 'multipart/related; boundary="' + boundary + '"'
                    },
                    'body': multipartRequestBody
                });

                if (!fileId) {
                    fileId = response.result.id; // Save file ID for subsequent updates
                }
                
                document.getElementById('save-btn').innerText = "Save to Google Drive";
                alert("Workbook saved successfully to your Google Drive!");
            } catch (err) {
                console.error("Error saving file: ", err);
                document.getElementById('save-btn').innerText = "Save Failed";
            }
        }
    </script>
</body>
</html>
